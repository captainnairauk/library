<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library</title>
    <link rel="stylesheet" href="./style.css">
</head>

<body>
    <header>
        <div class="header-container">
            <span>Library</span>
            <button>Log in</button>
        </div>
    </header>

    <div class="top">
        <button id="addBook">+ Add book</button>
    </div>

    <div class="popup">
        <div class="close-btn">&times;</div>
        <form autocomplete="off" onsubmit="event.preventDefault(); addBookToLibrary();">
            <h2>Add new book</h2>
            <div class="form-element">
                <label for="title">Title:</label>
                <input type="text" id="title" placeholder="Enter Book's Title" required>
            </div>
            <div class="form-element">
                <label for="title">Author:</label>
                <input type="text" id="author" placeholder="Enter Author's Name" required>
            </div>
            <div class="form-element">
                <label for="title">Pages:</label>
                <input type="number" id="pages" placeholder="Enter page number" min="1" required>
            </div>
            <div class="form-element">
                <label for="title">Have you read it?</label>
                <input type="checkbox" id="readOrNot" name="accept" value="yes">
            </div>
            <div class="form-element">
                <button type="submit" id="submitBtn">Submit</button>
            </div>
        </form>
    </div>

    <table class="list" id="bookList" >
        <thead>
            <tr>
                <th>Title</th>
                <th>Author</th>
                <th>Pages</th>
                <th>Read?</th>
                <th></th>
            </tr>
        </thead>
        <tbody>

        </tbody>
    </table>

    <footer>
        &#169 Copyright 2022 captainnairauk
    </footer>
    <script src="./script.js"></script>
</body>


</html>
